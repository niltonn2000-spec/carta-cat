<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carta para Katherin</title>
  <style>
    body {
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      font-family: 'Arial', sans-serif;
      text-align: center;
      color: #333;
    }
    .carta {
      margin-top: 100px;
      font-size: 24px;
      cursor: pointer;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
    #mensaje {
      display: none;
      margin-top: 50px;
      font-size: 20px;
    }
    #pregunta {
      display: none;
      font-size: 26px;
      margin-top: 20px;
      color: #e91e63;
    }
    #botones {
      display: none;
      margin-top: 30px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #si { background-color: #4CAF50; color: white; }
    #no { background-color: #f44336; color: white; }
    .flotante {
      position: absolute;
      animation: flotar 6s linear infinite;
    }
    @keyframes flotar {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-600px); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="carta" onclick="abrirCarta()">💌 Haz clic para abrir la carta</div>

  <div id="mensaje">
    <p>Para mi persona favorita que me hace latir y desenfrenar mi día,  
    la chica que me llena de amor e ilusión…</p>
    <h2 id="pregunta">¿Quisieras ser mi novia? 💕</h2>
  </div>

  <div id="botones">
    <button id="si" onclick="aceptar()">Correcto ✅</button>
    <button id="no" onmouseover="escapar()">No ❌</button>
  </div>

  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <script>
    function abrirCarta() {
      document.querySelector(".carta").style.display = "none"; 
      document.getElementById("mensaje").style.display = "block"; 
      document.getElementById("musica").play();

      // Mostrar la pregunta después de 2 segundos
      setTimeout(() => {
        document.getElementById("pregunta").style.display = "block";
      }, 2000);

      // Mostrar los botones después de 4 segundos
      setTimeout(() => {
        document.getElementById("botones").style.display = "block";
      }, 4000);
    }

    function aceptar() {
      // Lanzar los stickers flotantes
      setInterval(crearFlotante, 700);
    }

    function escapar() {
      const noBtn = document.getElementById("no");
      noBtn.style.position = "absolute";
      noBtn.style.left = Math.random() * window.innerWidth + "px";
      noBtn.style.top = Math.random() * window.innerHeight + "px";
    }

    function crearFlotante() {
      const iconos = ["corazon.png","bts.png","hellokitty.png"];
      const img = document.createElement("img");
      img.src = iconos[Math.floor(Math.random()*iconos.length)];
      img.className = "flotante";
      img.style.left = Math.random() * window.innerWidth + "px";
      img.style.top = window.innerHeight + "px";
      img.style.width = (30 + Math.random()*50) + "px";
      document.body.appendChild(img);
      setTimeout(() => img.remove(), 6000);
    }
  </script>
</body>
</html>
