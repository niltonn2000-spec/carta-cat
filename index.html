<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carta para Katherin</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to right, #a18cd1, #fbc2eb);
      font-family: 'Georgia', serif;
      text-align: center;
      overflow: hidden;
    }
    h1 {
      color: #fff;
      font-size: 2.5em;
      margin-top: 30px;
      animation: fadeIn 3s ease-in-out;
    }
    /* Carta cerrada */
    .carta {
      width: 300px;
      height: 200px;
      background: #fff;
      margin: 50px auto;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5em;
      cursor: pointer;
      transition: transform 0.5s;
    }
    .carta:hover {
      transform: scale(1.05);
    }
    /* Carta abierta */
    .mensaje {
      display: none;
      background: #fff;
      margin: 40px auto;
      padding: 40px;
      width: 70%;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      font-size: 1.3em;
      line-height: 1.6em;
      animation: fadeIn 2s ease-in-out;
    }
    .botones {
      margin-top: 40px;
      position: relative;
      display: none;
    }
    button {
      border: none;
      padding: 15px 30px;
      font-size: 1.2em;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
      margin: 20px;
      position: absolute;
    }
    button:hover {
      transform: scale(1.1);
    }
    #si {
      left: 40%;
      top: 85%;
      background-color: #6f42c1;
      color: white;
    }
    #no {
      left: 60%;
      top: 85%;
      background-color: #dc3545;
      color: white;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .flotante {
      position: absolute;
      animation: flotar 8s infinite;
    }
    .flotante img {
      width: 60px; /* tamaño del sticker */
      height: auto;
    }
    @keyframes flotar {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }
  </style>
</head>
<body>
  <h1>Para Mi Cat 💜</h1>
  
  <!-- Carta cerrada -->
  <div class="carta" onclick="abrirCarta()">
    📩 Abrir Carta
  </div>

  <!-- Carta abierta con mensaje -->
  <div class="mensaje" id="mensaje">
    Para mi persona favorita que me hace latir y desenfrenar mi día,  
    la chica que me llena de amor e entusiasmo,  
    te propongo esto... marca correcto ✅ vv
  </div>

  <!-- Botones -->
  <div class="botones" id="botones">
    <button id="si" onclick="aceptar()">Correcto ✅</button>
    <button id="no" onmouseover="escapar()">No ❌</button>
  </div>

  <!-- Música de fondo -->
  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
    Tu navegador no soporta audio en HTML5.
  </audio>

  <script>
    function abrirCarta() {
      document.querySelector(".carta").style.display = "none"; // oculta carta cerrada
      document.getElementById("mensaje").style.display = "block"; // muestra mensaje
      document.getElementById("botones").style.display = "block"; // muestra botones
      document.getElementById("musica").play(); // inicia música al abrir la carta
    }

    function aceptar() {
      alert("¡Sabía que dirías que sí, Katherin! 💜✨");
      // Activar animaciones flotantes (corazones, BTS y Hello Kitty)
      setInterval(crearFlotante, 700);
    }

    function escapar() {
      const noBtn = document.getElementById("no");
      const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
      const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    // Stickers flotantes: corazones, BTS y Hello Kitty
    const iconos = [
      "corazon.png",   // sticker de corazón
      "bts.png",       // sticker de BTS
      "hellokitty.png" // sticker de Hello Kitty
    ];

    function crearFlotante() {
      const elem = document.createElement("div");
      elem.classList.add("flotante");
      const img = document.createElement("img");
      img.src = iconos[Math.floor(Math.random() * iconos.length)];
      elem.style.left = Math.random() * window.innerWidth + "px";
      elem.style.animationDuration = (5 + Math.random() * 5) + "s";
      elem.appendChild(img);
      document.body.appendChild(elem);

      setTimeout(() => {
        elem.remove();
      }, 10000);
    }
  </script>
</body>
</html>
